# Provider routing configuration
# Each task maps to an ordered fallback chain of provider+model pairs.
# The router tries them in priority order, falling back on rate-limit or error.
#
# This file is the "config edit instead of code change" from arch doc Section 5.
# When a provider tightens its free tier, update this file — not the code.
#
# Model IDs verified against live API endpoints, July 2026.

tasks:

  # Stage 2b — Semantic document classification
  semantic_classification:
    providers:
      - provider: gemini
        model: gemini-2.5-flash-lite
        priority: 1
      - provider: groq
        model: llama-3.1-8b-instant
        priority: 2

  # Stages 4/5 — Vision-LLM OCR and layout analysis
  ocr_vision:
    providers:
      - provider: gemini
        model: gemini-2.5-flash
        priority: 1
      - provider: nvidia_nim
        model: meta/llama-3.2-90b-vision-instruct
        priority: 2

  layout_analysis:
    providers:
      - provider: gemini
        model: gemini-2.5-flash
        priority: 1
      - provider: nvidia_nim
        model: meta/llama-3.2-90b-vision-instruct
        priority: 2

  # Stage 6 — Table extraction (vision fallback)
  table_extraction:
    providers:
      - provider: gemini
        model: gemini-2.5-flash
        priority: 1
      - provider: nvidia_nim
        model: meta/llama-3.2-90b-vision-instruct
        priority: 2

  # Stage 7 — Charts and graphs
  chart_analysis:
    providers:
      - provider: gemini
        model: gemini-2.5-flash
        priority: 1
      - provider: nvidia_nim
        model: meta/llama-3.2-90b-vision-instruct
        priority: 2
      - provider: nvidia_nim
        model: nvidia/nemotron-nano-12b-v2-vl
        priority: 3

  # Stage 8 — General image understanding
  image_understanding:
    providers:
      - provider: gemini
        model: gemini-2.5-flash
        priority: 1
      - provider: nvidia_nim
        model: nvidia/nemotron-nano-12b-v2-vl
        priority: 2

  # Stage 14 — Generation tasks
  general_qa:
    providers:
      - provider: gemini
        model: gemini-2.5-flash
        priority: 1
      - provider: groq
        model: llama-3.3-70b-versatile
        priority: 2
      - provider: nvidia_nim
        model: qwen/qwen3.5-397b-a17b
        priority: 3

  reasoning:
    providers:
      - provider: groq
        model: llama-3.3-70b-versatile
        priority: 1
      - provider: gemini
        model: gemini-2.5-flash
        priority: 2
      - provider: nvidia_nim
        model: meta/llama3-70b-instruct
        priority: 3

  extraction:
    providers:
      - provider: nvidia_nim
        model: qwen/qwen3.5-397b-a17b
        priority: 1
      - provider: gemini
        model: gemini-2.5-flash
        priority: 2
      - provider: groq
        model: llama-3.1-8b-instant
        priority: 3

  summarization:
    providers:
      - provider: nvidia_nim
        model: moonshotai/kimi-k2.6
        priority: 1
      - provider: gemini
        model: gemini-2.5-flash
        priority: 2

  fast_support:
    providers:
      - provider: groq
        model: llama-3.1-8b-instant
        priority: 1
      - provider: gemini
        model: gemini-2.5-flash-lite
        priority: 2

  classification:
    providers:
      - provider: groq
        model: llama-3.1-8b-instant
        priority: 1
      - provider: gemini
        model: gemini-2.5-flash-lite
        priority: 2
